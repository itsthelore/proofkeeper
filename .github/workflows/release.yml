name: Release

# Publishes @itsthelore/proofkeeper to npm when a GitHub Release is published.
#
# Author the version the itsthelore way: a zero-padded CalVer (YYYY.MM.N, e.g.
# 2026.06.4, ADR-076) in package.json and the matching release tag. npm requires
# strict SemVer, which forbids leading zeros, so this workflow strips the month
# padding (2026.06.4 -> 2026.6.4) before publishing — the padded form stays the
# authoritative version across the org; only the npm artifact is de-padded.
#
# Requires a repository secret NPM_TOKEN: an npm automation / granular publish
# token with publish access to the @itsthelore scope.

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Resolve version (verify tag == package.json, then de-pad for npm)
        id: ver
        run: |
          RAW="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "release tag: $RAW | package.json: $PKG"
          if [ "$RAW" != "$PKG" ]; then
            echo "::error::release tag ($RAW) does not match package.json version ($PKG). Bump package.json, then re-cut the release."
            exit 1
          fi
          # Strip leading zeros from each dotted component (npm forbids them);
          # keep a lone 0 as 0, leave non-padded numbers untouched.
          NPM_VERSION="$(printf '%s' "$RAW" | awk -F. '{out=""; for(i=1;i<=NF;i++){f=$i; sub(/^0+/,"",f); if(f=="")f="0"; out=(i==1?f:out"."f)} print out}')"
          echo "npm version: $NPM_VERSION"
          echo "npm_version=$NPM_VERSION" >> "$GITHUB_OUTPUT"

      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - name: Set the de-padded version for the npm artifact
        run: npm pkg set version="${{ steps.ver.outputs.npm_version }}"

      - name: Publish to npm (public, with provenance)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
