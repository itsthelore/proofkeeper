<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Proofkeeper demo product</title>
  </head>
  <body>
    <h1 data-testid="heading">Lore Proofkeeper</h1>
    <button>Verify</button>
    <p data-testid="status">unverified</p>
    <script>
      document.querySelector("button").addEventListener("click", function () {
        document.querySelector('[data-testid="status"]').textContent = "verified";
      });
    </script>
  </body>
</html>
