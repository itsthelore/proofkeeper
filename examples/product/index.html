<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Proofkeeper demo product</title>
    <style>
      :root { color-scheme: light; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: #0b1020;
        color: #e7ecf5;
      }
      .card {
        width: 360px;
        padding: 32px;
        border-radius: 16px;
        background: #141a2e;
        border: 1px solid #26304d;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        text-align: center;
      }
      h1 { margin: 0 0 4px; font-size: 22px; letter-spacing: -0.01em; }
      .sub { margin: 0 0 24px; color: #93a1c0; font-size: 14px; }
      button {
        appearance: none;
        border: 0;
        border-radius: 10px;
        padding: 12px 22px;
        font-size: 15px;
        font-weight: 600;
        color: #0b1020;
        background: #6ea8fe;
        cursor: pointer;
        transition: transform 0.08s ease, background 0.15s ease;
      }
      button:hover { background: #8bbcff; }
      button:active { transform: translateY(1px); }
      .status {
        margin: 24px 0 0;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        border-radius: 999px;
        font-size: 14px;
        font-weight: 600;
        background: #2a2140;
        color: #c9a9ff;
      }
      .status::before {
        content: "";
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: currentColor;
      }
      .status.ok { background: #10331f; color: #57d98a; }
    </style>
  </head>
  <body>
    <main class="card">
      <h1 data-testid="heading">Lore Proofkeeper</h1>
      <p class="sub">demo product</p>
      <button>Verify</button>
      <p class="status" data-testid="status">unverified</p>
    </main>
    <script>
      document.querySelector("button").addEventListener("click", function () {
        var status = document.querySelector('[data-testid="status"]');
        status.textContent = "verified";
        status.classList.add("ok");
      });
    </script>
  </body>
</html>
